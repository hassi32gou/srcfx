<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SRCFX</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="logo logo-fixed"><span style="font-size: clamp(1.45rem, 3vw, 1.8rem); font-weight: 800;">SRCFX</span></div>

    <main>
        <div class="hero">
            <h1>国内人気ブローカートレーダー</h1>
            
            <div class="stats">
                <div class="stat-item"><span style="font-size: clamp(2.8rem, 7vw, 3.6rem); line-height: 1.05; font-weight: 900;">13ヶ月</span><p style="font-size: clamp(1.16rem, 2.9vw, 1.35rem); font-weight: 700; letter-spacing: 0.04em;">期間</p></div>
                <div class="stat-item"><span style="font-size: clamp(2.8rem, 7vw, 3.6rem); line-height: 1.05; font-weight: 900;">2回</span><p style="font-size: clamp(1.16rem, 2.9vw, 1.35rem); font-weight: 700; letter-spacing: 0.04em;">マイナス月</p></div>
                <div class="stat-item"><span style="font-size: clamp(2.8rem, 7vw, 3.6rem); line-height: 1.05; font-weight: 900;">401%</span><p style="font-size: clamp(1.16rem, 2.9vw, 1.35rem); font-weight: 700; letter-spacing: 0.04em;">トータル収益</p></div>
                <div class="stat-item"><span style="font-size: clamp(2.8rem, 7vw, 3.6rem); line-height: 1.05; font-weight: 900;">2552%</span><p style="font-size: clamp(1.16rem, 2.9vw, 1.35rem); font-weight: 700; letter-spacing: 0.04em;">複利収益</p></div>
            </div>

            <div class="info-box">
                <h2>HA trade</h2>
                <p>
                    長年、国内証券のレバの低い<br>
                    国内ブローカーで成果を出してきた大物トレーダーがこの度、コピトレを提供して下さることになりました。<br>
                    ただ余りにもロジックをバラしたくないためPAMM口座になります。（保有ポジションが見れません）。<br>
                    しかし、PAMMなので低資金からでも開始出来ます。<br>
                    ブローカーは、有名なMYFX Marketsです。
                </p>
            </div>

            <div class="cta-area">
                <button class="cta-btn" id="profitBtn" style="font-size: clamp(2.1rem, 4.8vw, 2.5rem); font-weight: 800;">利益表</button>
            </div>

            <div class="profit-image-wrap hidden" id="profitImageWrap">
                <img id="profitImage" src="assets/profit.jpg" alt="利益表画像">
            </div>
        </div>
    </main>
    <script>
        document.getElementById('profitBtn').addEventListener('click', function(event) {
            const wrap = document.getElementById('profitImageWrap');
            wrap.classList.toggle('hidden');
            this.textContent = wrap.classList.contains('hidden') ? '利益表' : '閉じる';
        });
    </script>
</body>
</html>
